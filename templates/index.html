<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlyatGPJPEG - AI Image Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    background: #1c1c1c;
    padding: 2rem;
    border-radius: 15px;
    width: 100%;
    max-width: 600px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    animation: fadeIn 0.8s ease forwards;
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    color: #ff6f61;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  input[type="text"] {
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 1rem;
    background: #2b2b2b;
    color: #fff;
    transition: all 0.2s ease;
  }

  input[type="text"]:focus {
    box-shadow: 0 0 10px #ff6f61;
  }

  button {
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: none;
    background: #110d21;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  button:hover {
    background: #ffffff;
    transform: scale(1.05);
  }

  .error {
    color: #ff4c4c;
    margin-bottom: 1rem;
  }

  .image-preview {
    margin-top: 1rem;
    max-width: 100%;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px);}
    to { opacity: 1; transform: translateY(0);}
  }
</style>
</head>
<body>
  <div class="container">
    <h1>BlyatGPJPEG</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <input type="text" name="prompt" placeholder="Enter prompt..." required>
      <button type="submit">Generate</button>
    </form>
  </div>
</body>
</html>
